; StarfieldAnimationFramework.ini
; -----------------------------------------------------------------------------
; Safe defaults for stable testing (no crashes)
; -----------------------------------------------------------------------------

; Hook toggles (vtable hooks are optional and may not tick on this version)
EnableMenuHook=1
EnableCameraHook=1
EnableInputHook=0
EnablePlayerUpdateEvent=1
; Optional RVA overrides for event GetEventSource (use only if ID=0 in AL)
UpdateSceneRectEventRVA=0x372CD00
PlayerUpdateEventRVA=0x2C539D0

; Graph update hook (RVA override). Keep if you found a working RVA.
GraphUpdateHookRVA=0xAF9810

; TaskUpdateLoop: runs SAF processing without a per-frame hook
EnableTaskUpdateLoop=1
TaskUpdateLoopAssumeMainThread=1

; These are dangerous on current builds (can crash). Keep OFF unless testing.
TaskUpdateLoopAllowUpdateGraphs=0
TaskUpdateLoopAllowDump=0

BSAnimationGraphUpdateRVA=0x35E0280

; Animation playback. 1=delta*base (correct orientation), 0=base*delta (upside down).
RotationOrderDeltaThenBase=1
ApplyAnimRotationOnly=0
; 1 = NAF-like apply (UseNAFApplyMode): ignoruj rest/game_base, użyj czystej rotacji z animacji (jak w NAF Graph::PushAnimationOutput).
; GLTF musi być w tym samym układzie co szkielet gry (Z-up) – domyślnie bez YUpToZUpConversion.
UseNAFApplyMode=0
; 1 = tułów/nogi: zapisuj tylko obrót z animacji (delta Y->Z), bez game_base – gdy "reszta ciała kręci się wokół osi", ręce zostają z game_base.
SkipGameBaseForSpineLegs=0
; Prosta poprawka osi dla kręgosłupa i nóg. 0=off. 1–4=kręgosłup+nogi Rx/Ry±90°.
; 5–6=tylko kręgosłup Rx(+90°)/Rx(-90°). 7–8=tylko nogi Rx(+90°)/Rx(-90°). Testuj 5–8 gdy 1–4 zginają w pół.
SpineLegsSimpleAxisFix=0
; Yaw flip 180° dla kręgosłupa i nóg – usuwa „kręcenie w prawo/lewo”. Gdy nogi/korpus kręcą się o 180°: ustaw 1.
; 1 = Spine+Legs Z-180°, 2 = tylko kręgosłup, 3 = tylko nogi.
SpineLegsYawFlip=1
; 1 = rest pose z kości aktora przy budowaniu joint map (bez ModelDB). Delta = inv(actor_rest)*anim; może pomóc gdy kręgosłup/nogi kręcą.
UseActorRestPose=0
; 1 = rest pose z NIF rasy przez ModelDB::GetEntry. ID z Address Library (saf offset2id <rva> w grze).
UseModelDBForRestPose=0
; ModelDB GetModelDBEntry – domyślnie 949826 (RVA 0x6744ECC). 0 = użyj domyślnego.
; ModelDBDecRefID=0
; ModelDB DecRef – znajdź RVA w IDA (wywołanie zaraz po GetModelDBEntry), w grze: saf offset2id <rva>, wpisz tu. 0 = 36741.
; ModelDBDecRefID=0
; 1 = only apply to joints that have animation (anim != rest), reduces deformation
ApplyOnlyToAnimatedJoints=1
; 1 = apply also to joint 0 (root) – potrzebne gdy r1/r_armup nic nie robi (animacja tylko na root). Może ukryć postać – testuj.
; ApplyToRootJoint=0

; If R_ArmUp (or single-limb anim) flips the whole character: try UseUpdateTransformAndBoundsOnRoot=0
; (animation may be less visible; avoids root recompute that can invert the skeleton)
; UseUpdateTransformAndBoundsOnRoot=0

; Bone mapping: restrict search to body subtree.
; SkeletonRootName=NPC

; Y-up (GLTF) to Z-up (Creation Engine). 1=apply, 0=no conversion.
ApplyYUpToZUpConversion=1
; 0 = -90° X, 1 = +90° X (kierunek obrotu C).
YUpToZUpConversionFlip=0
; 1 = C×delta×C⁻¹ (T-poza nienaruszona). 0 = stara konwersja C*M.
YUpToZUpConversionConjugate=1
; 1 = mnożenie w Y-up: base→Y, delta*base w Y-up, wynik→Z (delta i base w jednym układzie).
UnifiedYUpSpace=1
; If still distorted: try TransposeOutputRotation=1 (writes rotation as column-major).
TransposeOutputRotation=0
; 0 = surowy zapis (bezpieczne). 1 = SetLocalTransform API – na części buildów wywala; przy crashu zostaw 0.
UseNiNodeSetLocalTransform=0

; --- Ręce: orientacja "do przodu" względem modelu ---
; ArmsCorrectDirection: 4 = R*Rx(180°). 0=wył, 1–3=Rz.
ArmsCorrectDirection=4
; ArmsAlignToTorso: 1 = wyrównaj kierunek górnej części rąk do korpusu (C_Chest/Spine2/Neck) – ręce w kierunku tułowia.
ArmsAlignToTorso=1
; ArmsAlignForwardAxis: 0 = oś X kości ręki (col0), 1 = Y (col1), 2 = Z (col2). Przy "ręce za/ w bok" spróbuj 0.
ArmsAlignForwardAxis=0
; ArmsAlignToTorsoFlip: 0 = +kierunek tułowia (ręce z przodu). 1 = -kierunek gdy 0 daje za plecami.
ArmsAlignToTorsoFlip=0
; ArmsAlignForearmToTorsoUp: 1 = przedramiona w tym samym kierunku co górna część (do przodu) – cała ręka z przodu, nie na boki.
ArmsAlignForearmToTorsoUp=1
; FlipHandRotation=0
; ArmsInFrontFix=0
; ArmsForwardFix=0
; ArmsForwardFixZ=0
; ArmsAxisFix=0
; TransposeArmsOnly: 1 = transponuj macierz 3x3 tylko dla kości rąk (R→R^T). Próbować gdy osie są pomylone w podstawie.
TransposeArmsOnly=0
; ArmsRotationOrderOverride: 0=globalna kolejność, 1=wymuś delta*base dla rąk, 2=wymuś base*delta dla rąk.
ArmsRotationOrderOverride=0
; Gdy ręce przenoszą się na drugą stronę modelu: 1 = zamień mapowanie (R_* -> NPC L ..., L_* -> NPC R ...). W Starfieldzie często trzeba włączyć.
SwapArmsInJointMap=1
; Gdy ruch rąk wygląda "na suficie" (najpierw w dół, potem w górę): 1 = odwróć kierunek (180° X dla rąk).
; ArmsInvertUpDown=0
; Gdy prawa/lewa ręka przeskakuje na drugą stronę: lustrzanie 180°Y. Testuj po SwapArmsInJointMap.
; MirrorRightArmSoStaysOnRight=0
; MirrorLeftArmSoStaysOnLeft=0
; Gdy "ręka w górę" w animacji widać jako "w dół" (oś odwrócona): 1 = odwróć deltę rotacji (180°X) dla rąk. Testuj z arm_test.
ArmsInvertDelta=1
; Ręce na swoim miejscu + ruch do przodu (najpierw 4, potem 1 lub 2): 4 = ręce na miejscu, 1/2 = ruch z "nad głową" na "do przodu".
ArmsAlongTorsoFix=4
; Gdy przy ArmsAlongTorsoFix=4 ruch idzie nad głową zamiast do przodu: 1=Ry+90°, 2=Ry-90°.
ArmsForwardNotAboveHead=1